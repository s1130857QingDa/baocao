<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trang Web Mẫu</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f9; color: #333; }
    header { background: #4a90e2; color: white; padding: 20px; border-radius: 8px; text-align: center; }
    section { margin-top: 20px; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    button { background: #4a90e2; color: white; border: none; padding: 10px 16px; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <header>
    <h1>Chào mừng đến với trang HTML</h1>
    <p>Đây là ví dụ HTML cơ bản.</p>
  </header>
  <section>
    <h2>Giới thiệu</h2>
    <p>Đoạn văn bản này mô tả nội dung trang web. Bạn có thể thay đổi văn bản và thêm ảnh, liên kết, hoặc form.</p>
    <button onclick="alert('Xin chào!')">Nhấn tôi</button>
  </section>
</body>
</html
